name: Backend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        working-directory: backend
        run: uv sync --frozen

      - name: Ruff
        working-directory: backend
        run: uv run ruff check .

      - name: Mypy
        working-directory: backend
        run: uv run mypy .

      - name: Pytest
        working-directory: backend
        run: uv run pytest

